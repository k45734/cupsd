name: Docker Multi-Platform Build

# 1. 여기서 실행 타이밍을 결정합니다.
on:
  schedule:
    - cron: '0 0 * * *'  # 한국 시간 기준 오전 9시(UTC 0시)마다 자동으로 빌드 실행
  push:
    branches: [ "main" ]  # main 브랜치에 코드를 올릴 때도 실행
  workflow_dispatch:      # 💡 덤으로 넣었습니다! GitHub 웹에서 '수동 버튼'으로 빌드할 수 있게 해줍니다.
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 멀티 플랫폼(ARM, AMD) 빌드를 위한 환경 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub의 이미지 저장소(GHCR)에 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          username: k45734
          password: dckr_pat_8zIeYMw3jF09ol1Yp6YJSHOi5y0

      # 빌드 및 푸시 (여기가 핵심!)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 컴퓨터용, 라즈베리파이용 둘 다 만듦
          push: true
          tags: |
            k45734/cupsd:latest
            k45734/cupsd:${{ github.sha }}
